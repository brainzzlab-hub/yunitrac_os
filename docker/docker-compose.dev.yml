version: "3.9"

# Dev-safe base: offline-by-default, no secrets, no published ports.
services:
  ro_out_receiver:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ro_out_receiver
    image: yunitrack/ro_out_receiver:dev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./artifacts/enterprise:/artifacts:ro
    environment:
      RO_OUT_DIR: "/artifacts"
