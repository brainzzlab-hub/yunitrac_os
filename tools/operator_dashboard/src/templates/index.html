<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yunitrack_os Operator Dashboard (read-only)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; color: #0f172a; background: #f8fafc; }
    h1 { margin-bottom: 0.2rem; }
    h2 { margin-top: 1.6rem; margin-bottom: 0.4rem; }
    .banner { padding: 8px 12px; border-radius: 6px; background: #e2e8f0; display: inline-block; margin-bottom: 12px; }
    .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 14px; margin: 8px 0; box-shadow: 0 1px 2px rgba(15,23,42,0.08); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 10px; }
    pre { background: #0f172a; color: #e2e8f0; padding: 10px; border-radius: 6px; overflow-x: auto; font-size: 13px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #e2e8f0; padding: 6px 8px; text-align: left; }
    th { background: #f1f5f9; }
    .status-pass { color: #0f9d58; font-weight: 600; }
    .status-fail { color: #d93025; font-weight: 600; }
    .status-unknown { color: #6b7280; font-weight: 600; }
  </style>
</head>
<body>
  <h1>yunitrack_os Operator Dashboard</h1>
  <div class="banner">Read-only • Offline • Deterministic • No network</div>
  {{CONTENT}}
</body>
</html>
